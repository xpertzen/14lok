const wrap = document.getElementById("aartiWrap");
const noRes = document.getElementById("noResults");

function render(items){
  if(!items.length){
    wrap.innerHTML = "";
    noRes.style.display = "block";
    return;
  }
  noRes.style.display = "none";
  wrap.innerHTML = items.map((a,i) => `
    <div class="aarti-item" data-i="${i}">
      <div class="aarti-head" onclick="toggle(${i})">
        <div class="t">${a.title}</div>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="aarti-body">
        <div class="aarti-content">
          ${a.lines.map(l => `<div class="ln">${l}</div>`).join("")}
        </div>
      </div>
    </div>
  `).join("");
}

let currentList = AARTIS;
render(currentList);

function toggle(i){
  const el = wrap.querySelector(`.aarti-item[data-i="${i}"]`);
  const wasOpen = el.classList.contains("open");
  wrap.querySelectorAll(".aarti-item.open").forEach(o => o.classList.remove("open"));
  if(!wasOpen) el.classList.add("open");
}

function doSearch(){
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  if(!q){ currentList = AARTIS; render(currentList); return; }
  currentList = AARTIS.filter(a => a.title.toLowerCase().includes(q) ||
    a.lines.join(" ").toLowerCase().includes(q));
  render(currentList);
}

let fs=18;
function f(x){fs=Math.min(26,Math.max(15,fs+x*1.5));
  document.documentElement.style.setProperty('--nsc',(fs/18).toFixed(2));}
